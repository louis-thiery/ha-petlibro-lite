name: Feature request
description: Ask for a new entity, service, or behavior.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Worth a quick search through existing Issues / Discussions first —
        many of the PetLibro Lite app's settings (IR night vision, child
        lock, LED, etc.) are known-missing v0.2 scope and may already be
        tracked.
  - type: textarea
    id: what
    attributes:
      label: What would you like to see?
      description: One sentence is fine. Examples, screenshots, or use cases welcome.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: What would this unlock for you?
      description: Automation, dashboard, or workflow it would enable.
  - type: textarea
    id: alternatives
    attributes:
      label: What have you tried?
      description: Existing entities, workarounds, other integrations.
  - type: input
    id: feeder_model
    attributes:
      label: Feeder model (if device-specific)
      placeholder: PLAF203
